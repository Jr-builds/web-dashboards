<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaching Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     SPORTS COACHING THEME — Nike/Adidas inspired
     White base · Bold orange accent · Athletic energy
     ============================================================ */
  :root {
    --bg:           #ECEEF3;
    --surface:      #FFFFFF;
    --card:         #FFFFFF;
    --card-hover:   #F7F8FC;
    --border:       #DDE1EC;
    --border-light: #C8CEDF;

    /* Primary — energetic orange */
    --accent:       #E8410A;
    --accent-dark:  #C53308;
    --accent-light: #FF6B3D;
    --accent-dim:   rgba(232,65,10,0.08);
    --accent-glow:  rgba(232,65,10,0.18);

    /* Status colours — dark enough to read on white */
    --green:      #15803D;
    --green-dim:  rgba(21,128,61,0.1);
    --yellow:     #92400E;
    --yellow-dim: rgba(146,64,14,0.1);
    --red:        #B91C1C;
    --red-dim:    rgba(185,28,28,0.1);
    --blue:       #1D4ED8;
    --blue-dim:   rgba(29,78,216,0.1);

    /* Typography */
    --text:       #0F172A;
    --text-muted: #475569;
    --text-dim:   #94A3B8;

    /* Shadows */
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow:    0 3px 14px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.11), 0 2px 8px rgba(0,0,0,0.06);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100vh; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    font-size: 14px;
    line-height: 1.5;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ── SIDEBAR ───────────────────────────────────────────────── */
  .sidebar {
    width: 280px; min-width: 280px;
    height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: var(--shadow);
    position: relative;
  }
  /* Orange power stripe along the left edge */
  .sidebar::before {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent-light) 100%);
    z-index: 2;
  }

  .sidebar-header {
    padding: 20px 16px 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 11px;
    margin-bottom: 14px;
  }
  .sidebar-logo-icon {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 4px 14px var(--accent-glow);
  }
  .sidebar-logo-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 800;
    color: var(--text);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .sidebar-logo-sub {
    font-size: 10px; font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-top: 1px;
  }
  .sidebar-search { position: relative; }
  .sidebar-search input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px 9px 34px;
    color: var(--text); font-size: 13px;
    font-family: inherit; font-weight: 500;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .sidebar-search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
    background: #fff;
  }
  .sidebar-search input::placeholder { color: var(--text-dim); font-weight: 400; }
  .sidebar-search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); font-size: 13px; pointer-events: none;
  }

  .sidebar-section-label {
    padding: 14px 16px 6px 20px;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.4px;
    color: var(--text-dim); flex-shrink: 0;
  }

  .client-list {
    flex: 1; overflow-y: auto;
    padding: 4px 10px 8px 14px;
  }
  .client-card {
    padding: 11px 10px;
    border-radius: 10px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, box-shadow 0.18s;
    margin-bottom: 4px;
    position: relative;
  }
  .client-card:hover {
    background: var(--card-hover);
    border-color: var(--border);
    box-shadow: var(--shadow-sm);
  }
  .client-card.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-dim), var(--shadow-sm);
  }
  .client-card-top { display: flex; align-items: center; gap: 10px; }
  .client-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    flex-shrink: 0; color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .client-info { flex: 1; min-width: 0; }
  .client-name {
    font-size: 13px; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .client-traject {
    font-size: 11px; color: var(--text-muted); font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%; flex-shrink: 0;
  }
  .status-dot.actief {
    background: var(--green);
    box-shadow: 0 0 0 3px rgba(21,128,61,0.15);
  }
  .status-dot.inactief { background: var(--text-dim); }

  .mini-progress-wrap { margin-top: 9px; }
  .mini-progress-label {
    display: flex; justify-content: space-between;
    font-size: 10px; font-weight: 600;
    color: var(--text-muted); margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .mini-progress-bar {
    height: 5px; background: var(--bg);
    border-radius: 3px; overflow: hidden;
  }
  .mini-progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

  .sidebar-add-btn {
    margin: 10px;
    padding: 11px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 12px; font-weight: 700;
    font-family: inherit;
    cursor: pointer; text-align: center;
    text-transform: uppercase; letter-spacing: 0.8px;
    transition: background 0.18s, box-shadow 0.18s, transform 0.15s;
    flex-shrink: 0;
    box-shadow: 0 4px 14px var(--accent-glow);
  }
  .sidebar-add-btn:hover {
    background: var(--accent-dark);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px var(--accent-glow);
  }

  /* ── MAIN ──────────────────────────────────────────────────── */
  .main {
    flex: 1; display: flex; flex-direction: column;
    height: 100vh; overflow: hidden; min-width: 0;
  }

  /* ── HEADER ────────────────────────────────────────────────── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    position: relative;
  }
  /* Thin orange underline on active header */
  .header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-light) 40%, transparent 100%);
  }
  .header-left h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--text);
  }
  .header-left .header-date {
    font-size: 11px; font-weight: 600;
    color: var(--text-muted); margin-top: 1px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ── BUTTONS ───────────────────────────────────────────────── */
  .btn {
    padding: 8px 16px; border-radius: 8px;
    font-size: 12px; font-weight: 700;
    cursor: pointer; border: none; font-family: inherit;
    transition: all 0.18s;
    display: flex; align-items: center; gap: 5px;
    text-transform: uppercase; letter-spacing: 0.6px;
  }
  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 3px 12px var(--accent-glow);
  }
  .btn-primary:hover {
    background: var(--accent-dark);
    box-shadow: 0 5px 18px var(--accent-glow);
    transform: translateY(-1px);
  }
  .btn-outline {
    background: transparent; color: var(--text-muted);
    border: 1.5px solid var(--border);
  }
  .btn-outline:hover {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: var(--accent);
  }
  .btn-sm { padding: 5px 11px; font-size: 11px; }
  .btn-danger {
    background: var(--red-dim); color: var(--red);
    border: 1.5px solid rgba(185,28,28,0.2);
  }
  .btn-danger:hover { background: rgba(185,28,28,0.18); }
  .btn-ghost {
    background: transparent; color: var(--text-muted);
    border: none; padding: 5px 8px;
  }
  .btn-ghost:hover { color: var(--text); background: var(--bg); border-radius: 6px; }

  /* ── CONTENT AREA ──────────────────────────────────────────── */
  .content-area {
    flex: 1; overflow-y: auto;
    padding: 20px 24px;
    display: flex; flex-direction: column; gap: 20px;
  }

  /* ── KPI STRIP ─────────────────────────────────────────────── */
  .kpi-strip { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
  .kpi-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 18px 18px 14px;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    box-shadow: var(--shadow-sm);
    position: relative; overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
  }
  .kpi-card:nth-child(1)::before { background: var(--accent); }
  .kpi-card:nth-child(2)::before { background: var(--blue); }
  .kpi-card:nth-child(3)::before { background: var(--green); }
  .kpi-card:nth-child(4)::before { background: var(--yellow); }
  .kpi-card:hover {
    border-color: var(--border-light);
    box-shadow: var(--shadow);
    transform: translateY(-2px);
  }
  .kpi-label {
    font-size: 10px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .kpi-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 38px; font-weight: 800;
    margin: 4px 0 2px; line-height: 1;
  }
  .kpi-sub { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .kpi-icon { font-size: 20px; float: right; opacity: 0.4; margin-top: -2px; }

  /* ── CLIENT BANNER ─────────────────────────────────────────── */
  .client-banner {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-left: 5px solid var(--client-color, var(--accent));
    border-radius: 14px;
    padding: 18px 22px;
    display: flex; align-items: center; gap: 18px;
    animation: slideDown 0.25s ease;
    box-shadow: var(--shadow);
  }
  @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .banner-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800;
    color: #fff; flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  }
  .banner-info { flex: 1; }
  .banner-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .banner-traject { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }
  .banner-stats { display: flex; gap: 24px; }
  .banner-stat { text-align: center; }
  .banner-stat-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 800; color: var(--accent);
    line-height: 1;
  }
  .banner-stat-label {
    font-size: 9px; font-weight: 700;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
  }
  .banner-close {
    background: none; border: none; color: var(--text-muted);
    font-size: 20px; cursor: pointer;
    padding: 4px 8px; border-radius: 8px;
    transition: color 0.18s, background 0.18s;
  }
  .banner-close:hover { color: var(--text); background: var(--bg); }

  /* ── DASHBOARD GRID ────────────────────────────────────────── */
  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 16px;
  }

  /* ── PANELS ────────────────────────────────────────────────── */
  .panel {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .panel-header {
    padding: 14px 16px;
    border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    background: var(--bg);
  }
  .panel-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--text);
    display: flex; align-items: center; gap: 7px;
  }
  .panel-title-icon { font-size: 15px; opacity: 0.7; }
  .panel-body { padding: 12px; overflow-y: auto; max-height: 380px; }
  .panel-body.sessions-body { max-height: 380px; }
  .panel-full { grid-column: 1 / -1; }

  /* ── GOAL ITEMS ────────────────────────────────────────────── */
  .goal-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 13px 14px;
    margin-bottom: 8px;
    transition: border-color 0.18s, box-shadow 0.18s, transform 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .goal-item:hover {
    border-color: var(--border-light);
    box-shadow: var(--shadow);
    transform: translateX(3px);
  }
  .goal-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 9px; }
  .goal-title-wrap { flex: 1; min-width: 0; }
  .goal-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .goal-client-tag { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
  .goal-client-dot { width: 6px; height: 6px; border-radius: 50%; }
  .goal-badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: flex-start; }
  .badge {
    padding: 3px 8px; border-radius: 20px;
    font-size: 10px; font-weight: 700;
    white-space: nowrap;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .badge-hoog   { background: var(--red-dim);    color: var(--red);    }
  .badge-middel { background: var(--yellow-dim);  color: var(--yellow); }
  .badge-laag   { background: var(--green-dim);   color: var(--green);  }
  .badge-cat    { background: var(--accent-dim);  color: var(--accent); }
  .badge-online { background: var(--blue-dim);    color: var(--blue);   }
  .badge-persoonlijk { background: var(--green-dim); color: var(--green); }
  .badge-duur   { background: rgba(100,116,139,0.1); color: var(--text-muted); }

  .goal-progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
  .goal-progress-bar {
    flex: 1; height: 8px; background: var(--bg);
    border-radius: 4px; overflow: hidden;
  }
  .goal-progress-fill {
    height: 100%; border-radius: 4px; width: 0;
    transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
  }
  .goal-pct { font-size: 12px; font-weight: 800; width: 34px; text-align: right; }
  .goal-meta { display: flex; align-items: center; justify-content: space-between; }
  .goal-deadline { font-size: 10px; color: var(--text-muted); font-weight: 600; }
  .goal-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.18s; }
  .goal-item:hover .goal-actions { opacity: 1; }

  /* ── SESSION ITEMS ─────────────────────────────────────────── */
  .week-group-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-muted);
    padding: 8px 4px 4px;
    border-bottom: 1.5px solid var(--border);
    margin-bottom: 7px;
  }
  .week-group-label:not(:first-child) { margin-top: 14px; }

  .session-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    border-left: 4px solid var(--border);
    background: var(--surface);
    margin-bottom: 7px;
    transition: background 0.18s, box-shadow 0.18s;
    box-shadow: var(--shadow-sm);
    cursor: default;
  }
  .session-item:hover { background: var(--card-hover); box-shadow: var(--shadow); }
  .session-date-block {
    min-width: 40px; text-align: center;
    background: var(--bg);
    border-radius: 8px; padding: 5px 4px;
    flex-shrink: 0;
  }
  .session-day {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 800; line-height: 1;
  }
  .session-month {
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  .session-info { flex: 1; min-width: 0; }
  .session-client { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }
  .session-badges { display: flex; gap: 4px; align-items: center; }
  .session-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.18s; }
  .session-item:hover .session-actions { opacity: 1; }

  /* ── NOTE CARDS ────────────────────────────────────────────── */
  .notes-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 12px; padding: 12px;
  }
  .note-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-top: 4px solid var(--border);
    border-radius: 12px; padding: 14px;
    cursor: pointer;
    transition: border-color 0.18s, box-shadow 0.18s, transform 0.18s;
    box-shadow: var(--shadow-sm);
  }
  .note-card:hover {
    border-color: var(--border-light);
    box-shadow: var(--shadow-lg);
    transform: translateY(-3px);
  }
  .note-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .note-title { font-size: 12px; font-weight: 700; flex: 1; color: var(--text); }
  .note-date { font-size: 10px; color: var(--text-muted); flex-shrink: 0; margin-left: 8px; margin-top: 1px; font-weight: 600; }
  .note-client-tag { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-muted); margin-bottom: 7px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
  .note-preview { font-size: 11px; color: var(--text-muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  .empty-state { text-align: center; padding: 36px 16px; color: var(--text-dim); font-size: 12px; font-weight: 500; }
  .empty-state-icon { font-size: 30px; margin-bottom: 8px; opacity: 0.35; }

  /* ── MODALS ────────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .modal {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    width: 500px; max-width: 90vw; max-height: 85vh;
    display: flex; flex-direction: column;
    animation: slideUp 0.25s ease;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }
  .modal-wide { width: 640px; }
  @keyframes slideUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

  .modal-header {
    padding: 18px 22px 14px;
    border-bottom: 1.5px solid var(--border);

  .color-picker-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .color-swatch {
    width: 30px; height: 30px;

// ============================================================
// HELPERS
// ============================================================
function getInitials(naam) {
  return naam.split(' ').filter(Boolean).map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function getClientProgress(clientId) {
  const goals = data.doelen.filter(d => d.klantId === clientId);
  if (!goals.length) return 0;
  return Math.round(goals.reduce((s, g) => s + g.voortgang, 0) / goals.length);
}

function getProgressColor(pct) {
  if (pct >= 70) return 'var(--green)';
  if (pct >= 40) return 'var(--yellow)';
  return 'var(--red)';
}

function formatDatum(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  const months = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

function formatDatumShort(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  const months = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  return `${parseInt(d)} ${months[parseInt(m)-1]}`;
}

function getDayNum(dateStr) {
  return parseInt(dateStr.split('-')[2]);
}

function getMonthAbbr(dateStr) {
  const months = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  return months[parseInt(dateStr.split('-')[1]) - 1];
}

function getDaysUntil(dateStr) {
  const today = new Date(TODAY);
  const target = new Date(dateStr);
  return Math.round((target - today) / 86400000);
}

function getWeekGroup(dateStr) {
  const today = new Date(TODAY);
  const todayDay = today.getDay();
  const mondayOffset = todayDay === 0 ? -6 : 1 - todayDay;
  const monday = new Date(today);
  monday.setDate(today.getDate() + mondayOffset);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const nextMonday = new Date(monday);
  nextMonday.setDate(monday.getDate() + 7);
  const nextSunday = new Date(monday);
  nextSunday.setDate(monday.getDate() + 13);
  const d = new Date(dateStr);
  if (d >= monday && d <= sunday) return 'deze-week';
  if (d >= nextMonday && d <= nextSunday) return 'volgende-week';
  return 'later';
}

function nextId(arr) {
  return arr.length ? Math.max(...arr.map(x => x.id)) + 1 : 1;
}

function getKlant(id) {
  return data.klanten.find(k => k.id === id);
}

// ============================================================
// STORAGE
// ============================================================
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      data = JSON.parse(raw);
    } else {
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      saveData();
    }
  } catch(e) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function renderKPIs() {

  const mondayOffset = todayDay === 0 ? -6 : 1 - todayDay;

  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const sessiesDezeWeek = data.sessies.filter(s => {
    const d = new Date(s.datum);
    return d >= monday && d <= sunday;
  }).length;

  const doelenOpSchema = data.doelen.filter(d => d.voortgang >= 70).length;

      <div class="kpi-label">Sessies deze week</div>

      <div class="kpi-icon">&#9989;</div>
      <div class="kpi-label">Doelen op schema</div>
      <div class="kpi-value" style="color:var(--green)">${doelenOpSchema}</div>
      <div class="kpi-sub">van ${data.doelen.length} doelen &ge;70%</div>
    </div>

      <div class="kpi-icon">&#128200;</div>
      <div class="kpi-label">Gem. voortgang</div>

// ============================================================
// SESSIES
// ============================================================
function renderSessies() {
  const panel = document.getElementById('sessiesPanel');
  const today = new Date(TODAY);
  const upcoming = data.sessies
    .filter(s => new Date(s.datum) >= today)
    .sort((a, b) => a.datum.localeCompare(b.datum) || a.tijd.localeCompare(b.tijd));

  if (!upcoming.length) {
    panel.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#128197;</div>Geen aankomende sessies</div>';
    return;
  }

  const groups = { 'deze-week': [], 'volgende-week': [], 'later': [] };
  upcoming.forEach(s => groups[getWeekGroup(s.datum)].push(s));

  const groupLabels = { 'deze-week': 'Deze week', 'volgende-week': 'Volgende week', 'later': 'Later' };
  let html = '';
  ['deze-week','volgende-week','later'].forEach(g => {
    if (!groups[g].length) return;
    html += `<div class="week-group-label">${groupLabels[g]}</div>`;
    groups[g].forEach(s => {
      const k = getKlant(s.klantId);
      const color = k ? k.kleur : 'var(--border)';
      const typeClass = s.type === 'online' ? 'badge-online' : 'badge-persoonlijk';
      html += `
        <div class="session-item" style="border-left-color:${color}">
          <div class="session-date-block">
            <div class="session-day" style="color:${color}">${getDayNum(s.datum)}</div>
            <div class="session-month">${getMonthAbbr(s.datum)}</div>
          </div>
          <div class="session-info">
            <div class="session-client">${k ? escHtml(k.naam) : '—'}</div>
            <div class="session-time">${s.tijd} &bull; ${s.duur} min</div>
          </div>
          <div class="session-badges">
            <span class="badge ${typeClass}">${s.type}</span>
          </div>
          <div class="session-actions">
            <button class="btn btn-ghost btn-sm" onclick="openSessieModal(${s.id})" title="Bewerken">&#9998;</button>
            <button class="btn btn-danger btn-sm" onclick="deleteSessie(${s.id})" title="Verwijderen">&#128465;</button>
          </div>
        </div>
      `;
    });
  });

  panel.innerHTML = html;
}

// ============================================================
// SAVE / DELETE
// ============================================================
function saveKlant() {
  const naam = document.getElementById('klantNaam').value.trim();
  if (!naam) { alert('Naam is verplicht.'); return; }
  const id = parseInt(document.getElementById('klantId').value) || null;

  const obj = {
    naam,
    email: document.getElementById('klantEmail').value.trim(),
    telefoon: document.getElementById('klantTelefoon').value.trim(),
    traject: document.getElementById('klantTraject').value.trim(),
    startdatum: document.getElementById('klantStartdatum').value,
    status: document.getElementById('klantStatus').value,
    kleur: state.selectedColor
  };

  if (id) {
    const idx = data.klanten.findIndex(k => k.id === id);
    data.klanten[idx] = { ...data.klanten[idx], ...obj };
  } else {
    obj.id = nextId(data.klanten);
    data.klanten.push(obj);
  }

  saveData(); closeAllModals(); renderAll();
}

function deleteKlant(id) {
  if (!confirm('Klant verwijderen? Alle bijbehorende sessies, doelen en notities worden ook verwijderd.')) return;
  data.klanten = data.klanten.filter(k => k.id !== id);
  data.sessies = data.sessies.filter(s => s.klantId !== id);
  data.doelen = data.doelen.filter(d => d.klantId !== id);
  data.notities = data.notities.filter(n => n.klantId !== id);
  if (state.selectedClientId === id) state.selectedClientId = null;
  saveData(); closeAllModals(); renderAll();
}

function saveSessie() {
  const klantId = parseInt(document.getElementById('sessieKlant').value);
  const datum = document.getElementById('sessieDatum').value;
  if (!klantId || !datum) { alert('Klant en datum zijn verplicht.'); return; }
  const id = parseInt(document.getElementById('sessieId').value) || null;

  const obj = {
    klantId, datum,
    tijd: document.getElementById('sessieTijd').value,
    duur: parseInt(document.getElementById('sessieDuur').value) || 60,
    type: document.getElementById('sessieType').value,
    status: 'gepland'
  };

  if (id) {
    const idx = data.sessies.findIndex(s => s.id === id);
    data.sessies[idx] = { ...data.sessies[idx], ...obj };
  } else {
    obj.id = nextId(data.sessies);
    data.sessies.push(obj);
  }

  saveData(); closeAllModals(); renderAll();
}

function deleteSessie(id) {
  if (!confirm('Sessie verwijderen?')) return;
  data.sessies = data.sessies.filter(s => s.id !== id);
  saveData(); renderAll();
}

function saveDoel() {
  const klantId = parseInt(document.getElementById('doelKlant').value);
  const titel = document.getElementById('doelTitel').value.trim();
  if (!klantId || !titel) { alert('Klant en titel zijn verplicht.'); return; }
  const id = parseInt(document.getElementById('doelId').value) || null;

  const obj = {
    klantId, titel,
    categorie: document.getElementById('doelCategorie').value.trim() || 'Algemeen',
    deadline: document.getElementById('doelDeadline').value,
    prioriteit: document.getElementById('doelPrioriteit').value,
    voortgang: parseInt(document.getElementById('doelVoortgang').value) || 0
  };

  if (id) {
    const idx = data.doelen.findIndex(d => d.id === id);
    data.doelen[idx] = { ...data.doelen[idx], ...obj };
  } else {
    obj.id = nextId(data.doelen);
    data.doelen.push(obj);
  }

  saveData(); closeAllModals(); renderAll();
}

function deleteDoel(id) {
  if (!confirm('Doel verwijderen?')) return;
  data.doelen = data.doelen.filter(d => d.id !== id);
  saveData(); closeAllModals(); renderAll();
}

function saveNotitie() {
  const klantId = parseInt(document.getElementById('notitieKlant').value);
  const titel = document.getElementById('notitieTitel').value.trim();
  if (!klantId || !titel) { alert('Klant en titel zijn verplicht.'); return; }
  const id = parseInt(document.getElementById('notitieId').value) || null;

  const obj = {
    klantId,
    datum: document.getElementById('notitieDatum').value || TODAY,
    titel,
    inhoud: document.getElementById('notitieInhoud').value.trim()
  };

  if (id) {
    const idx = data.notities.findIndex(n => n.id === id);
    data.notities[idx] = { ...data.notities[idx], ...obj };
  } else {
    obj.id = nextId(data.notities);
    data.notities.push(obj);
  }

  saveData(); closeAllModals(); renderAll();
}

function deleteNotitie(id) {
  if (!confirm('Notitie verwijderen?')) return;
  data.notities = data.notities.filter(n => n.id !== id);
  saveData(); closeAllModals();
  state.currentNoteId = null;
  renderAll();
}

// ============================================================
// ESCAPE HTML
// ============================================================
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeAllModals();
});

// ============================================================
// START
// ============================================================
init();
</script>
</body>
</html>
