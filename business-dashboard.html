<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSINESS INTELLIGENCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&family=Orbitron:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --electric-blue: #00D9FF;
            --neon-cyan: #00FFF0;
            --danger-red: #FF0040;
            --power-yellow: #FFD700;
            --success-green: #00FF41;
            --dark-void: #0A0E27;
            --card-dark: #151929;
            --surface: #1E2336;
            --border-glow: #2A3254;
            --text-primary: #FFFFFF;
            --text-dim: #8B92B8;
            --shadow-intense: 0 8px 32px rgba(0, 217, 255, 0.15);
            --shadow-brutal: 0 12px 48px rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-void);
            color: var(--text-primary);
            line-height: 1.4;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(0, 217, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 64, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            margin-bottom: 40px;
            border-bottom: 2px solid var(--border-glow);
            padding-bottom: 24px;
            position: relative;
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 72px;
            font-weight: 400;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--electric-blue), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 217, 255, 0.5);
            position: relative;
        }

        h1::before {
            content: '//';
            position: absolute;
            left: -40px;
            color: var(--danger-red);
            opacity: 0.6;
        }

        .status-badge {
            background: linear-gradient(135deg, var(--surface), var(--card-dark));
            border: 1px solid var(--electric-blue);
            padding: 12px 24px;
            border-radius: 6px;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 217, 255, 0.3); }
            50% { box-shadow: 0 0 30px rgba(0, 217, 255, 0.6); }
        }

        .date-display {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: 8px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card {
            background: linear-gradient(135deg, var(--card-dark), var(--surface));
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--electric-blue);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .stat-card:hover {
            transform: translateY(-6px);
            border-color: var(--electric-blue);
            box-shadow: var(--shadow-intense);
        }

        .stat-card:hover::after {
            opacity: 1;
        }

        .stat-card.streak::before {
            background: var(--power-yellow);
        }

        .stat-card.streak:hover {
            border-color: var(--power-yellow);
        }

        .stat-card.weekly::before {
            background: var(--success-green);
        }

        .stat-card.weekly:hover {
            border-color: var(--success-green);
        }

        .stat-card.monthly::before {
            background: var(--danger-red);
        }

        .stat-card.monthly:hover {
            border-color: var(--danger-red);
        }

        .stat-icon {
            font-size: 28px;
            margin-bottom: 12px;
            opacity: 0.8;
        }

        .stat-label {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .stat-value {
            font-family: 'Orbitron', monospace;
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 8px;
            color: var(--electric-blue);
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .stat-card.streak .stat-value {
            color: var(--power-yellow);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .stat-card.weekly .stat-value {
            color: var(--success-green);
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }

        .stat-card.monthly .stat-value {
            color: var(--danger-red);
            text-shadow: 0 0 20px rgba(255, 0, 64, 0.5);
        }

        .stat-unit {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Progress */
        .progress-section {
            background: linear-gradient(135deg, var(--card-dark), var(--surface));
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 1s ease-out 0.3s backwards;
        }

        .progress-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(0, 217, 255, 0.02) 10px,
                rgba(0, 217, 255, 0.02) 20px
            );
            pointer-events: none;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }

        .progress-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 32px;
            letter-spacing: 2px;
            color: var(--text-primary);
        }

        .progress-percentage {
            font-family: 'Orbitron', monospace;
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--electric-blue), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .progress-bar-container {
            width: 100%;
            height: 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--electric-blue), var(--neon-cyan), var(--electric-blue));
            background-size: 200% 100%;
            border-radius: 8px;
            transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Tasks */
        .habits-section {
            background: linear-gradient(135deg, var(--card-dark), var(--surface));
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
            animation: fadeInUp 1.2s ease-out 0.4s backwards;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-glow);
        }

        .section-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 36px;
            letter-spacing: 2px;
            color: var(--text-primary);
        }

        .habits-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .habit-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glow);
            border-left: 4px solid var(--electric-blue);
            border-radius: 6px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: grab;
            position: relative;
            overflow: hidden;
        }

        .habit-item.dragging {
            opacity: 0.5;
            cursor: grabbing;
            transform: scale(1.05);
            z-index: 100;
        }

        .habit-item.drag-over {
            border-top: 3px solid var(--neon-cyan);
            box-shadow: 0 -4px 20px rgba(0, 255, 240, 0.5);
        }

        .drag-handle {
            font-size: 20px;
            color: var(--text-dim);
            cursor: grab;
            user-select: none;
            transition: color 0.3s ease;
        }

        .habit-item:hover .drag-handle {
            color: var(--electric-blue);
        }

        .habit-item.dragging .drag-handle {
            cursor: grabbing;
        }

        .habit-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: linear-gradient(90deg, rgba(0, 217, 255, 0.1), transparent);
            transition: width 0.4s ease;
        }

        .habit-item:hover::before {
            width: 100%;
        }

        .habit-item:hover {
            border-left-color: var(--neon-cyan);
            transform: translateX(8px);
            box-shadow: -4px 0 20px rgba(0, 217, 255, 0.3);
        }

        .habit-item.completed {
            background: rgba(0, 255, 65, 0.05);
            border-left-color: var(--success-green);
            border-color: rgba(0, 255, 65, 0.3);
        }

        .habit-item.completed::before {
            background: linear-gradient(90deg, rgba(0, 255, 65, 0.1), transparent);
        }

        .habit-item.completed .habit-name {
            color: var(--text-dim);
        }

        /* Checkbox */
        .checkbox-wrapper {
            position: relative;
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }

        .checkbox-wrapper input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 2;
        }

        .checkbox-custom {
            width: 32px;
            height: 32px;
            border: 2px solid var(--electric-blue);
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            clip-path: polygon(0 0, 100% 0, 100% 75%, 75% 100%, 0 100%);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.3);
        }

        .checkbox-wrapper input:checked + .checkbox-custom {
            background: var(--success-green);
            border-color: var(--success-green);
            transform: scale(1.1) rotate(360deg);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.8);
        }

        .checkbox-custom::after {
            content: '✓';
            color: var(--dark-void);
            font-size: 20px;
            font-weight: 900;
            opacity: 0;
            transform: scale(0) rotate(-180deg);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .checkbox-wrapper input:checked + .checkbox-custom::after {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        /* Task Info */
        .habit-info {
            flex: 1;
            min-width: 0;
        }

        .habit-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .habit-xp {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .xp-badge {
            background: linear-gradient(135deg, var(--electric-blue), var(--neon-cyan));
            color: var(--dark-void);
            padding: 6px 16px;
            border-radius: 4px;
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(0, 217, 255, 0.4);
            clip-path: polygon(8% 0, 100% 0, 100% 100%, 0 100%, 0 25%);
        }

        /* Actions */
        .habit-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .habit-item:hover .habit-actions {
            opacity: 1;
        }

        .btn {
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 700;
            padding: 10px 18px;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            clip-path: polygon(8% 0, 100% 0, 100% 100%, 0 100%, 0 25%);
        }

        .btn-icon {
            padding: 10px 14px;
            font-size: 16px;
        }

        .btn-edit {
            background: rgba(0, 217, 255, 0.2);
            color: var(--electric-blue);
            border: 1px solid var(--electric-blue);
        }

        .btn-edit:hover {
            background: var(--electric-blue);
            color: var(--dark-void);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.6);
            transform: translateY(-2px);
        }

        .btn-delete {
            background: rgba(255, 0, 64, 0.2);
            color: var(--danger-red);
            border: 1px solid var(--danger-red);
        }

        .btn-delete:hover {
            background: var(--danger-red);
            color: var(--text-primary);
            box-shadow: 0 0 20px rgba(255, 0, 64, 0.6);
            transform: translateY(-2px);
        }

        .btn-add {
            background: linear-gradient(135deg, var(--success-green), #00CC35);
            color: var(--dark-void);
            padding: 16px 32px;
            font-size: 16px;
            margin-top: 24px;
            box-shadow: 0 8px 24px rgba(0, 255, 65, 0.3);
            clip-path: polygon(5% 0, 100% 0, 100% 100%, 0 100%, 0 20%);
        }

        .btn-add:hover {
            box-shadow: 0 12px 32px rgba(0, 255, 65, 0.5);
            transform: translateY(-4px);
        }

        /* Settings */
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glow);
            border-radius: 6px;
            margin-top: 28px;
        }

        .settings-info {
            flex: 1;
        }

        .settings-label {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .settings-description {
            font-size: 13px;
            color: var(--text-dim);
        }

        /* Toggle */
        .toggle-switch {
            position: relative;
            width: 64px;
            height: 32px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--border-glow);
            transition: 0.4s;
            border-radius: 32px;
        }

        .toggle-slider::before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background: var(--text-dim);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.6);
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--success-green);
            border-color: var(--success-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(32px);
            background: var(--dark-void);
            box-shadow: 0 0 12px rgba(0, 255, 65, 0.8);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--card-dark), var(--surface));
            border: 2px solid var(--electric-blue);
            border-radius: 8px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 60px rgba(0, 217, 255, 0.4), var(--shadow-brutal);
            animation: modalSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--electric-blue), var(--neon-cyan), var(--electric-blue));
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        .modal-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 36px;
            letter-spacing: 2px;
            color: var(--text-primary);
            margin-bottom: 28px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-glow);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--electric-blue);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .btn-save {
            flex: 1;
            background: linear-gradient(135deg, var(--electric-blue), var(--neon-cyan));
            color: var(--dark-void);
            padding: 16px;
            font-size: 15px;
        }

        .btn-cancel {
            flex: 1;
            background: rgba(255, 0, 64, 0.2);
            color: var(--danger-red);
            border: 1px solid var(--danger-red);
            padding: 16px;
            font-size: 15px;
        }

        /* Celebration */
        .celebration {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, var(--card-dark), var(--surface));
            border: 3px solid var(--success-green);
            border-radius: 8px;
            padding: 48px;
            text-align: center;
            z-index: 1001;
            box-shadow: 0 0 80px rgba(0, 255, 65, 0.6), var(--shadow-brutal);
            display: none;
            min-width: 450px;
        }

        .celebration.show {
            display: block;
            animation: victoryPop 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes victoryPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5) rotate(-5deg);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1) rotate(2deg);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
            }
        }

        .celebration-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: victory 1.5s ease-in-out infinite;
        }

        @keyframes victory {
            0%, 100% {
                transform: scale(1) rotate(0deg);
            }
            25% {
                transform: scale(1.2) rotate(-10deg);
            }
            75% {
                transform: scale(1.2) rotate(10deg);
            }
        }

        .celebration-text {
            font-family: 'Bebas Neue', cursive;
            font-size: 42px;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--success-green), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .celebration-subtext {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            color: var(--text-dim);
            margin-bottom: 32px;
            letter-spacing: 1px;
        }

        .celebration-close {
            background: linear-gradient(135deg, var(--success-green), #00CC35);
            color: var(--dark-void);
            padding: 16px 40px;
            border-radius: 4px;
            border: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            clip-path: polygon(5% 0, 100% 0, 100% 100%, 0 100%, 0 20%);
            box-shadow: 0 8px 24px rgba(0, 255, 65, 0.4);
        }

        .celebration-close:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 255, 65, 0.6);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 24px 16px;
            }

            h1 {
                font-size: 48px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }

            .stat-value {
                font-size: 36px;
            }

            .habit-item {
                padding: 16px;
                flex-direction: column;
                align-items: flex-start;
            }

            .habit-actions {
                opacity: 1;
                width: 100%;
                justify-content: flex-end;
            }

            .celebration {
                min-width: auto;
                width: 90%;
                padding: 32px 24px;
            }

            .celebration-text {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div>
                    <h1>BUSINESS INTELLIGENCE</h1>
                    <div class="date-display" id="currentDate"></div>
                </div>
                <div class="status-badge">LIVE DATA</div>
            </div>
        </header>

        <!-- Revenue & KPI Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-label">Omzet Vandaag</div>
                <div class="stat-value">
                    <span id="dailyScore">€0</span>
                </div>
                <div class="stat-unit">Gefactureerd</div>
            </div>

            <div class="stat-card streak">
                <div class="stat-icon">📈</div>
                <div class="stat-label">Groei</div>
                <div class="stat-value">
                    <span id="streakCount">+0</span>
                </div>
                <div class="stat-unit">% MoM</div>
            </div>

            <div class="stat-card weekly">
                <div class="stat-icon">🗂️</div>
                <div class="stat-label">Deze Week</div>
                <div class="stat-value">
                    <span id="weeklyScore">0</span>
                </div>
                <div class="stat-unit">Taken Voltooid</div>
            </div>

            <div class="stat-card monthly">
                <div class="stat-icon">🎯</div>
                <div class="stat-label">Maand Target</div>
                <div class="stat-value">
                    <span id="monthlyScore">0</span>
                </div>
                <div class="stat-unit">% Behaald</div>
            </div>
        </div>

        <!-- Q1 Revenue Target Progress -->
        <div class="progress-section">
            <div class="progress-header">
                <div class="progress-title">Q1 OMZETDOEL — VOORTGANG</div>
                <div class="progress-percentage" id="progressPercentage">0%</div>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <!-- Daily Tasks & Action Items -->
        <div class="habits-section">
            <div class="section-header">
                <div class="section-title">DAGELIJKSE ACTIES & DEADLINES</div>
            </div>

            <div class="habits-list" id="habitsList"></div>

            <button class="btn btn-add" onclick="openAddHabitModal()">+ NIEUWE TAAK TOEVOEGEN</button>

            <div class="settings-row">
                <div class="settings-info">
                    <div class="settings-label">Weekendtaken Meetellen</div>
                    <div class="settings-description">Activeer voor doorlopende projecten en weekenddiensten</div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="includeWeekends" onchange="updateScores()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
    </div>

    <div class="celebration" id="celebration">
        <div class="celebration-icon">🏆</div>
        <div class="celebration-text" id="celebrationText"></div>
        <div class="celebration-subtext" id="celebrationSubtext"></div>
        <button class="celebration-close" onclick="closeCelebration()">DOORGAAN</button>
    </div>

    <div class="modal" id="habitModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Nieuwe Taak</div>
            <form id="habitForm">
                <div class="form-group">
                    <label class="form-label">Taakomschrijving</label>
                    <input type="text" class="form-input" id="habitName" placeholder="Bijv. Kwartaalrapportage opstellen" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Prioriteit Score</label>
                    <input type="number" class="form-input" id="habitXP" min="1" value="10" placeholder="10" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-save">OPSLAAN</button>
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">ANNULEREN</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let habits = [];
        let completions = {};
        let editingHabitId = null;

        function init() {
            updateDateDisplay();
            loadData();
            renderHabits();
            updateScores();
            checkForCelebrations();
        }

        function updateDateDisplay() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date();
            document.getElementById('currentDate').textContent = today.toLocaleDateString('nl-NL', options).toUpperCase();
        }

        function loadData() {
            const savedHabits = localStorage.getItem('biz_tasks');
            const savedCompletions = localStorage.getItem('biz_completions');

            if (savedHabits) {
                habits = JSON.parse(savedHabits);
            } else {
                habits = [
                    { id: 1, name: 'Dagelijkse standup — team sync 09:00', xp: 10 },
                    { id: 2, name: 'Sales pipeline reviewen & bijwerken', xp: 25 },
                    { id: 3, name: 'Klantfacturen goedkeuren', xp: 20 },
                    { id: 4, name: 'KPI-dashboard controleren & rapporteren', xp: 30 },
                    { id: 5, name: '2× 90 min focusblok — strategie & uitvoering', xp: 30 },
                    { id: 6, name: 'Openstaande offertes opvolgen', xp: 20 },
                    { id: 7, name: 'Projectstatus updaten in systeem', xp: 15 },
                    { id: 8, name: 'Dagafsluiting — inbox nul & prioriteiten morgen', xp: 15 }
                ];
            }

            if (savedCompletions) {
                completions = JSON.parse(savedCompletions);
            }
        }

        function saveData() {
            localStorage.setItem('biz_tasks', JSON.stringify(habits));
            localStorage.setItem('biz_completions', JSON.stringify(completions));
        }

        function getTodayKey() {
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        }

        function renderHabits() {
            const todayKey = getTodayKey();
            const habitsList = document.getElementById('habitsList');

            if (!completions[todayKey]) {
                completions[todayKey] = {};
            }

            habitsList.innerHTML = habits.map((habit, index) => {
                const isCompleted = completions[todayKey][habit.id] || false;
                return `
                    <div class="habit-item ${isCompleted ? 'completed' : ''}"
                         draggable="true"
                         data-habit-id="${habit.id}"
                         data-index="${index}">
                        <div class="drag-handle">⋮⋮</div>
                        <div class="checkbox-wrapper">
                            <input type="checkbox"
                                   ${isCompleted ? 'checked' : ''}
                                   onchange="toggleHabit(${habit.id})">
                            <div class="checkbox-custom"></div>
                        </div>
                        <div class="habit-info">
                            <div class="habit-name">${habit.name}</div>
                            <div class="habit-xp">
                                <span class="xp-badge">P${habit.xp}</span>
                            </div>
                        </div>
                        <div class="habit-actions">
                            <button class="btn btn-icon btn-edit" onclick="editHabit(${habit.id})" title="Bewerken">✏️</button>
                            <button class="btn btn-icon btn-delete" onclick="deleteHabit(${habit.id})" title="Verwijderen">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');

            addDragAndDropListeners();
        }

        let draggedElement = null;
        let draggedIndex = null;

        function addDragAndDropListeners() {
            const habitItems = document.querySelectorAll('.habit-item');

            habitItems.forEach((item, index) => {
                item.addEventListener('dragstart', (e) => {
                    draggedElement = item;
                    draggedIndex = index;
                    item.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });

                item.addEventListener('dragend', (e) => {
                    item.classList.remove('dragging');
                    document.querySelectorAll('.habit-item').forEach(el => {
                        el.classList.remove('drag-over');
                    });
                });

                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    if (item !== draggedElement) {
                        item.classList.add('drag-over');
                    }
                });

                item.addEventListener('dragleave', (e) => {
                    item.classList.remove('drag-over');
                });

                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    item.classList.remove('drag-over');
                    if (draggedElement !== item) {
                        const dropIndex = parseInt(item.dataset.index);
                        const temp = habits[draggedIndex];
                        habits[draggedIndex] = habits[dropIndex];
                        habits[dropIndex] = temp;
                        saveData();
                        renderHabits();
                    }
                });
            });
        }

        function toggleHabit(habitId) {
            const todayKey = getTodayKey();
            if (!completions[todayKey]) {
                completions[todayKey] = {};
            }
            completions[todayKey][habitId] = !completions[todayKey][habitId];
            saveData();
            renderHabits();
            updateScores();
            checkForCelebrations();
        }

        function updateScores() {
            const todayKey = getTodayKey();
            const includeWeekends = document.getElementById('includeWeekends').checked;

            // Daily score: show completed tasks count
            let dailyCompleted = 0;
            let maxDaily = habits.length;

            habits.forEach(habit => {
                if (completions[todayKey] && completions[todayKey][habit.id]) {
                    dailyCompleted++;
                }
            });

            document.getElementById('dailyScore').textContent = `€${(dailyCompleted * 1250).toLocaleString('nl-NL')}`;

            const percentage = maxDaily > 0 ? Math.round((dailyCompleted / maxDaily) * 100) : 0;
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressPercentage').textContent = percentage + '%';

            const weeklyScore = calculateWeeklyScore(includeWeekends);
            document.getElementById('weeklyScore').textContent = weeklyScore;

            const monthlyScore = calculateMonthlyScore();
            document.getElementById('monthlyScore').textContent = monthlyScore + '%';

            const streak = calculateStreak();
            document.getElementById('streakCount').textContent = '+' + streak;
        }

        function calculateWeeklyScore(includeWeekends) {
            const today = new Date();
            const dayOfWeek = today.getDay();
            const monday = new Date(today);
            monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));

            let completed = 0;
            for (let i = 0; i < 7; i++) {
                const date = new Date(monday);
                date.setDate(monday.getDate() + i);
                const dow = date.getDay();

                if (!includeWeekends && (dow === 0 || dow === 6)) continue;

                const dateKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;

                if (completions[dateKey]) {
                    habits.forEach(habit => {
                        if (completions[dateKey][habit.id]) completed++;
                    });
                }
            }
            return completed;
        }

        function calculateMonthlyScore() {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();

            let completed = 0;
            let possible = 0;

            Object.keys(completions).forEach(dateKey => {
                const [y, m] = dateKey.split('-').map(Number);
                if (y === year && m === month + 1) {
                    habits.forEach(habit => {
                        possible++;
                        if (completions[dateKey][habit.id]) completed++;
                    });
                }
            });

            return possible > 0 ? Math.round((completed / possible) * 100) : 0;
        }

        function calculateStreak() {
            const today = new Date();
            let streak = 0;
            let currentDate = new Date(today);

            while (true) {
                const dateKey = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(currentDate.getDate()).padStart(2, '0')}`;

                if (!completions[dateKey]) break;

                let allCompleted = true;
                habits.forEach(habit => {
                    if (!completions[dateKey][habit.id]) allCompleted = false;
                });

                if (!allCompleted) break;

                streak++;
                currentDate.setDate(currentDate.getDate() - 1);
            }

            return streak;
        }

        function checkForCelebrations() {
            const todayKey = getTodayKey();
            const celebrationShown = sessionStorage.getItem(`biz_celebration_${todayKey}`);
            if (celebrationShown) return;

            let dayComplete = true;
            let completedCount = 0;

            habits.forEach(habit => {
                if (!completions[todayKey] || !completions[todayKey][habit.id]) {
                    dayComplete = false;
                } else {
                    completedCount++;
                }
            });

            if (dayComplete && habits.length > 0) {
                const streak = calculateStreak();
                showCelebration('DAGDOELEN BEHAALD!', `${completedCount} TAKEN VOLTOOID • ${streak} DAGEN CONSISTENTIE`);
                sessionStorage.setItem(`biz_celebration_${todayKey}`, 'true');
            }
        }

        function showCelebration(title, subtitle) {
            document.getElementById('celebrationText').textContent = title;
            document.getElementById('celebrationSubtext').textContent = subtitle;
            document.getElementById('celebration').classList.add('show');
        }

        function closeCelebration() {
            document.getElementById('celebration').classList.remove('show');
        }

        function openAddHabitModal() {
            editingHabitId = null;
            document.getElementById('modalTitle').textContent = 'Nieuwe Taak';
            document.getElementById('habitName').value = '';
            document.getElementById('habitXP').value = '10';
            document.getElementById('habitModal').classList.add('show');
        }

        function editHabit(habitId) {
            const habit = habits.find(h => h.id === habitId);
            if (!habit) return;

            editingHabitId = habitId;
            document.getElementById('modalTitle').textContent = 'Taak Bewerken';
            document.getElementById('habitName').value = habit.name;
            document.getElementById('habitXP').value = habit.xp;
            document.getElementById('habitModal').classList.add('show');
        }

        function deleteHabit(habitId) {
            if (confirm('Weet je zeker dat je deze taak wilt verwijderen?')) {
                habits = habits.filter(h => h.id !== habitId);
                Object.keys(completions).forEach(dateKey => {
                    delete completions[dateKey][habitId];
                });
                saveData();
                renderHabits();
                updateScores();
            }
        }

        function closeModal() {
            document.getElementById('habitModal').classList.remove('show');
        }

        document.getElementById('habitForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('habitName').value.trim();
            const xp = parseInt(document.getElementById('habitXP').value);

            if (!name || xp < 1) return;

            if (editingHabitId) {
                const habit = habits.find(h => h.id === editingHabitId);
                if (habit) {
                    habit.name = name;
                    habit.xp = xp;
                }
            } else {
                const newId = habits.length > 0 ? Math.max(...habits.map(h => h.id)) + 1 : 1;
                habits.push({ id: newId, name, xp });
            }

            saveData();
            renderHabits();
            updateScores();
            closeModal();
        });

        init();
    </script>
</body>
</html>
